[[edge_functions]]
  path = "/property/*"
  function = "og-injector"

[[edge_functions]]
  path = "/guides/*"
  function = "guide-meta-injector"

[[edge_functions]]
  path = "/about"
  function = "guide-meta-injector"

[[edge_functions]]
  path = "/terms-of-service"
  function = "guide-meta-injector"

[[redirects]]
  from = "/terms"
  to = "/terms-of-service"
  status = 301
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "https://ivvgyrmyjfftqteaiyuf.supabase.co/functions/v1/sitemap"
  status = 200
  force = true
  [redirects.headers]
    X-Forwarded-Host = "yhensproperty.com"

[build]
  command = "npm run build"
  publish = "dist"

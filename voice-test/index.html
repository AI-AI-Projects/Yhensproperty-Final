<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yhen's Voice Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #09090b;
            color: #f4f4f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            user-select: none;
        }

        /* Brand name */
        .brand {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #71717a;
            font-weight: 500;
        }

        /* Status pill */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #71717a;
            transition: all 0.3s ease;
            min-width: 180px;
            justify-content: center;
        }
        .status-pill.listening {
            border-color: #eab308;
            color: #eab308;
        }
        .status-pill.speaking {
            border-color: #22c55e;
            color: #22c55e;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3f3f46;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }
        .status-pill.listening .status-dot {
            background: #eab308;
            box-shadow: 0 0 6px #eab308;
            animation: pulse 1.2s infinite;
        }
        .status-pill.speaking .status-dot {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Mic button */
        .mic-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mic-ring {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #27272a;
            color: #71717a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }
        .mic-btn:hover { background: #3f3f46; color: #a1a1aa; }
        .mic-btn.listening {
            background: #eab308;
            color: #09090b;
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.35);
        }
        .mic-btn.speaking {
            background: #22c55e;
            color: #09090b;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.35);
        }
        .mic-ring.listening {
            border-color: rgba(234, 179, 8, 0.25);
            animation: ring-pulse 1.5s infinite;
        }
        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Speech text card */
        .speech-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 16px 20px;
            width: 320px;
            min-height: 72px;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #a1a1aa;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .speech-card.has-text { color: #f4f4f5; }
        .speech-card .speaker-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .speech-card .yhen-label { color: #eab308; }
        .speech-card .user-label { color: #71717a; }

        /* Text input row */
        .text-row {
            display: flex;
            gap: 8px;
            width: 320px;
        }
        .text-row input {
            flex: 1;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 10px;
            color: #f4f4f5;
            padding: 10px 14px;
            font-size: 0.85rem;
            outline: none;
            font-family: inherit;
        }
        .text-row input::placeholder { color: #52525b; }
        .text-row input:focus { border-color: #3f3f46; }
        .text-row input:disabled { opacity: 0.4; cursor: not-allowed; }
        .text-row button {
            background: #eab308;
            color: #09090b;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .text-row button:hover { opacity: 0.85; }
        .text-row button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Property cards */
        .property-cards {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .property-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .property-card .prop-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #f4f4f5;
            line-height: 1.4;
        }
        .property-card .prop-meta {
            font-size: 0.72rem;
            color: #71717a;
        }
        .property-card .prop-link {
            font-size: 0.75rem;
            color: #eab308;
            text-decoration: underline;
            word-break: break-all;
            margin-top: 2px;
        }

        /* Disconnect button */
        .disconnect-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #ef4444;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .disconnect-btn:hover { background: #3f3f46; }

        svg { display: block; }
    </style>
</head>
<body>

    <span class="brand">Yhen's Property &nbsp;·&nbsp; AI Assistant</span>

    <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Tap to connect</span>
    </div>

    <div class="mic-wrap">
        <div class="mic-ring" id="mic-ring"></div>
        <button class="mic-btn" id="mic-btn" title="Connect & speak">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/>
            </svg>
        </button>
    </div>

    <div class="speech-card" id="speech-card">
        <span style="color:#52525b;font-size:0.8rem;">Connect to start talking to Yhen</span>
    </div>

    <div class="property-cards" id="property-cards"></div>

    <div class="text-row">
        <input type="text" id="text-input" placeholder="Or type a message..." disabled>
        <button id="btn-send" disabled>Send</button>
    </div>

    <button class="disconnect-btn" id="disconnect-link" title="Disconnect">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
    </button>

<script>
    const micBtn       = document.getElementById('mic-btn');
    const micRing      = document.getElementById('mic-ring');
    const statusPill   = document.getElementById('status-pill');
    const statusText   = document.getElementById('status-text');
    const speechCard    = document.getElementById('speech-card');
    const propertyCards = document.getElementById('property-cards');
    const textInput    = document.getElementById('text-input');
    const btnSend      = document.getElementById('btn-send');
    const disconnectLink = document.getElementById('disconnect-link');

    let ws, audioContext, mediaStream, scriptProcessor, playbackContext;
    let isMuted = false;
    let isAISpeaking = false;
    let activeAudioSources = 0;
    let activeSources = [];
    let pendingTurnComplete = false;
    let connected = false;
    let currentSpeechText = '';
    let currentSpeaker = null; // 'yhen' | 'user'

    function setStatus(state) {
        // state: 'idle' | 'connecting' | 'listening' | 'speaking'
        statusPill.className = 'status-pill';
        micBtn.className = 'mic-btn';
        micRing.className = 'mic-ring';
        if (state === 'listening') {
            statusPill.classList.add('listening');
            micBtn.classList.add('listening');
            micRing.classList.add('listening');
            statusText.innerText = 'Listening...';
        } else if (state === 'speaking') {
            statusPill.classList.add('speaking');
            micBtn.classList.add('speaking');
            statusText.innerText = 'Yhen is speaking';
        } else if (state === 'connecting') {
            statusText.innerText = 'Connecting...';
        } else {
            statusText.innerText = 'Tap to connect';
        }
    }

    function linkify(text) {
        return text.replace(/(https?:\/\/[^\s]+)/g, url =>
            `<a href="${url}" target="_blank" style="color:#eab308;text-decoration:underline;word-break:break-all;">${url}</a>`
        );
    }

    function showSpeech(text, speaker) {
        currentSpeechText = text;
        currentSpeaker = speaker;
        const label = speaker === 'yhen'
            ? `<div class="speaker-label yhen-label">Yhen</div>`
            : `<div class="speaker-label user-label">You</div>`;
        speechCard.className = 'speech-card has-text';
        speechCard.innerHTML = label + `<div>${linkify(text)}</div>`;
    }

    function clearSpeech() {
        speechCard.className = 'speech-card';
        speechCard.innerHTML = '<span style="color:#52525b;font-size:0.8rem;">Listening for your question...</span>';
    }

    function convertFloat32ToInt16(buffer) {
        let l = buffer.length;
        const buf = new Int16Array(l);
        while (l--) buf[l] = Math.max(-1, Math.min(1, buffer[l])) * 0x7FFF;
        return buf;
    }

    function base64ToInt16Array(base64) {
        const binary = window.atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new Int16Array(bytes.buffer);
    }

    let nextPlayTime = 0;

    async function playAudio(base64Data) {
        if (!playbackContext) playbackContext = new AudioContext({ sampleRate: 24000 });
        const int16 = base64ToInt16Array(base64Data);
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 0x7FFF;

        const buffer = playbackContext.createBuffer(1, float32.length, 24000);
        buffer.getChannelData(0).set(float32);

        const source = playbackContext.createBufferSource();
        source.buffer = buffer;
        source.connect(playbackContext.destination);
        if (nextPlayTime < playbackContext.currentTime) nextPlayTime = playbackContext.currentTime;
        activeAudioSources++;
        activeSources.push(source);
        source.onended = () => {
            activeAudioSources--;
            activeSources = activeSources.filter(s => s !== source);
            if (pendingTurnComplete && activeAudioSources === 0) {
                pendingTurnComplete = false;
                isAISpeaking = false;
                setStatus('listening');
            }
        };
        source.start(nextPlayTime);
        nextPlayTime += buffer.duration;
    }

    function stopAllAudio() {
        activeSources.forEach(s => { try { s.stop(); } catch(e) {} });
        activeSources = [];
        activeAudioSources = 0;
        pendingTurnComplete = false;
        isAISpeaking = false;
        nextPlayTime = 0;
    }

    let yhenSpeechBuffer = '';

    function handleMessage(msg) {
        if (msg.type === 'interrupted') {
            stopAllAudio();
            yhenSpeechBuffer = '';
            setStatus('listening');
        } else if (msg.type === 'aiSpeaking') {
            isAISpeaking = true;
            pendingTurnComplete = false;
            yhenSpeechBuffer = '';
            setStatus('speaking');
        } else if (msg.type === 'audio') {
            playAudio(msg.data);
        } else if (msg.type === 'turnComplete') {
            yhenSpeechBuffer = '';
            if (activeAudioSources === 0) {
                isAISpeaking = false;
                setStatus('listening');
            } else {
                pendingTurnComplete = true;
            }
        } else if (msg.type === 'text') {
            yhenSpeechBuffer += msg.data;
            showSpeech(yhenSpeechBuffer, 'yhen');
        } else if (msg.type === 'properties') {
            propertyCards.innerHTML = '';
            msg.data.forEach(p => {
                const card = document.createElement('div');
                card.className = 'property-card';
                const meta = [p.beds > 0 ? `${p.beds} bed` : null, p.price, p.location].filter(Boolean).join(' · ');
                card.innerHTML = `
                    <div class="prop-title">${p.title}</div>
                    <div class="prop-meta">${meta}</div>
                    <a class="prop-link" href="${p.url}" target="_blank">${p.url}</a>
                `;
                propertyCards.appendChild(card);
            });
        } else if (msg.type === 'userText') {
            showSpeech(msg.data, 'user');
        }
    }

    async function connect() {
        if (connected) return;
        setStatus('connecting');
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            ws = new WebSocket('ws://localhost:3000');

            ws.onopen = () => {
                connected = true;
                setStatus('listening');
                textInput.disabled = false;
                btnSend.disabled = false;
                disconnectLink.style.display = 'flex';
                speechCard.className = 'speech-card';
                speechCard.innerHTML = '<span style="color:#52525b;font-size:0.8rem;">Listening for your question...</span>';

                audioContext = new AudioContext({ sampleRate: 16000 });
                const src = audioContext.createMediaStreamSource(mediaStream);
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                src.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);
                scriptProcessor.onaudioprocess = (e) => {
                    if (ws.readyState !== WebSocket.OPEN) return;
                    const pcm16 = convertFloat32ToInt16(e.inputBuffer.getChannelData(0));
                    const base64 = btoa(String.fromCharCode(...new Uint8Array(pcm16.buffer)));
                    ws.send(JSON.stringify({ type: 'realtimeInput', data: base64 }));
                };
            };

            ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
            ws.onclose = () => disconnect();

        } catch (err) {
            console.error(err);
            setStatus('idle');
            alert('Could not access microphone or connect to server.');
        }
    }

    function disconnect() {
        connected = false;
        if (ws) ws.close();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (audioContext) audioContext.close();
        if (scriptProcessor) scriptProcessor.disconnect();
        setStatus('idle');
        textInput.disabled = true;
        btnSend.disabled = true;
        disconnectLink.style.display = 'none';
        speechCard.className = 'speech-card';
        speechCard.innerHTML = '<span style="color:#52525b;font-size:0.8rem;">Connect to start talking to Yhen</span>';
    }

    micBtn.addEventListener('click', () => {
        if (!connected) connect();
    });

    disconnectLink.addEventListener('click', disconnect);

    btnSend.addEventListener('click', () => {
        const val = textInput.value.trim();
        if (val && ws && ws.readyState === WebSocket.OPEN) {
            showSpeech(val, 'user');
            ws.send(JSON.stringify({ type: 'text', data: val }));
            textInput.value = '';
        }
    });

    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btnSend.click();
    });
</script>
</body>
</html>
